---
layout: null
---
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel GEMA · Admin</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@3.3.3/dist/decap-cms.js"></script>
  <script>
  CMS.init({
    config: {
      load_config_file: false,
      backend: {
        name: 'github',
        repo: 'Glebstrauss/site_gema',
        branch: 'master',
        auth_type: 'pkce',
        app_id: 'Ov23lisswKeYlP9Kp0C1'
      },
      media_folder: 'assets/img/professores',
      public_folder: '/site_gema/assets/img/professores',
      locale: 'pt',
      collections: [
        {
          name: 'professores',
          label: 'Professores',
          label_singular: 'Professor',
          folder: '_professores',
          create: true,
          slug: '{{slug}}',
          identifier_field: 'nome',
          summary: '{{nome}} — {{cargo}}',
          sortable_fields: ['ordem', 'nome'],
          fields: [
            { label: 'Nome completo', name: 'nome', widget: 'string',
              hint: 'Ex: Prof. Dr. Joao da Silva' },
            { label: 'Cargo', name: 'cargo', widget: 'string',
              hint: 'Ex: Coordenador · EMVZ/UFBA' },
            { label: 'Tipo', name: 'tipo', widget: 'select',
              options: [
                { label: 'Docente / Orientador', value: 'docente' },
                { label: 'Estudante de pos-graduacao', value: 'estudante' }
              ],
              default: 'docente' },
            { label: 'Foto', name: 'foto', widget: 'image',
              required: false, allow_multiple: false,
              hint: 'Foto quadrada (ex: 400x400 px). Max 300 KB.' },
            { label: 'Iniciais (aparecem sem foto)', name: 'avatar',
              widget: 'string', hint: 'Ex: JS para Joao Silva',
              pattern: ['.{2,3}', 'Use 2 ou 3 letras'] },
            { label: 'Descricao', name: 'descricao', widget: 'text',
              hint: '1 a 2 frases sobre a area de pesquisa' },
            { label: 'Areas de pesquisa', name: 'tags', widget: 'list',
              hint: 'Clique em + para adicionar. Ex: Genomica, BLUP, Equideos' },
            { label: 'Link Lattes', name: 'lattes', widget: 'string',
              required: false, hint: 'URL completa do curriculo Lattes' },
            { label: 'E-mail institucional', name: 'email',
              widget: 'string', required: false },
            { label: 'Ordem de exibicao', name: 'ordem',
              widget: 'number', default: 99, value_type: 'int',
              hint: '1 = aparece primeiro' }
          ]
        },
        {
          name: 'publicacoes',
          label: 'Publicacoes',
          files: [
            {
              label: 'Lista de Publicacoes',
              name: 'publicacoes',
              file: '_data/publicacoes.yml',
              fields: [
                {
                  label: 'Publicacoes', name: 'items', widget: 'list',
                  summary: '{{fields.ano}} — {{fields.titulo}}',
                  fields: [
                    { label: 'Ano', name: 'ano', widget: 'number', value_type: 'int' },
                    { label: 'Titulo', name: 'titulo', widget: 'string' },
                    { label: 'Autores', name: 'autores', widget: 'string',
                      hint: 'Ex: Silva, M.; Strauss, G. et al.' },
                    { label: 'Periodico', name: 'periodico', widget: 'string' },
                    { label: 'Qualis (ex: Q1)', name: 'qualis',
                      widget: 'string', required: false },
                    { label: 'Link DOI (URL completa)', name: 'doi',
                      widget: 'string', required: false }
                  ]
                }
              ]
            }
          ]
        },
        {
          name: 'premios',
          label: 'Premios',
          files: [
            {
              label: 'Lista de Premios',
              name: 'premios',
              file: '_data/premios.yml',
              fields: [
                {
                  label: 'Premios', name: 'items', widget: 'list',
                  summary: '{{fields.ano}} — {{fields.nome}}',
                  fields: [
                    { label: 'Nome do premio', name: 'nome', widget: 'string' },
                    { label: 'Entidade / Evento', name: 'entidade', widget: 'string' },
                    { label: 'Ano', name: 'ano', widget: 'number', value_type: 'int' },
                    { label: 'Icone (emoji)', name: 'icone', widget: 'string',
                      default: 'trophy', hint: 'Cole um emoji: trofeu, medalha, etc.' },
                    { label: 'Descricao', name: 'descricao', widget: 'text' }
                  ]
                }
              ]
            }
          ]
        },
        {
          name: 'noticias',
          label: 'Noticias',
          files: [
            {
              label: 'Lista de Noticias',
              name: 'noticias',
              file: '_data/noticias.yml',
              fields: [
                {
                  label: 'Noticias', name: 'items', widget: 'list',
                  summary: '{{fields.data}} — {{fields.titulo}}',
                  fields: [
                    { label: 'Data', name: 'data', widget: 'string',
                      hint: 'Ex: Maio 2025' },
                    { label: 'Titulo', name: 'titulo', widget: 'string' },
                    { label: 'Texto', name: 'texto', widget: 'text' },
                    { label: 'Link (opcional)', name: 'link',
                      widget: 'string', required: false },
                    { label: 'Destaque na home?', name: 'destaque',
                      widget: 'boolean', default: false,
                      hint: 'Apenas uma noticia deve ser destaque por vez' }
                  ]
                }
              ]
            }
          ]
        }
      ]
    }
  });
  </script>
</body>
</html>
